<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sky Shooter</title>

<style>
  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  html,body{
    margin:0;
    padding:0;
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
    touch-action:none;
  }

  canvas{
    display:block;
    width:100vw;
    height:100vh;
    background:#000;
  }

  .hud{
    position:fixed;
    top:12px;
    left:12px;
    color:#fff;
    font-size:18px;
    z-index:10;
    user-select:none;
  }

  .message{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:#fff;
    z-index:20;
    text-align:center;
    background:rgba(0,0,0,0.45);
    padding:24px;
  }

  .message.hidden{
    display:none;
  }

  .message h1{
    margin:0 0 12px;
    font-size:clamp(30px,6vw,56px);
  }

  .message p{
    margin:6px 0;
    font-size:clamp(16px,3vw,22px);
    opacity:.9;
  }

  .message button{
    margin-top:18px;
    padding:14px 22px;
    border:1px solid #fff;
    background:#111;
    color:#fff;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
  }

  .mobileControls{
    position:fixed;
    left:0;
    right:0;
    bottom:16px;
    z-index:15;
    display:flex;
    justify-content:space-between;
    padding:0 16px;
    pointer-events:none;
  }

  .ctrlGroup{
    display:flex;
    gap:12px;
    pointer-events:auto;
  }

  .ctrlBtn{
    width:72px;
    height:72px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.35);
    background:rgba(255,255,255,.08);
    color:#fff;
    font-size:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    user-select:none;
    backdrop-filter:blur(4px);
  }

  .ctrlBtn:active{
    background:rgba(255,255,255,.18);
  }

  @media (min-width:900px) and (pointer:fine){
    .mobileControls{
      display:none;
    }
  }
</style>
</head>
<body>

<div class="hud">Score: <span id="score">0</span></div>

<div id="startScreen" class="message">
  <h1>Mercedes vs Tesla</h1>
  <p>Desktop: use ← and → to move, Space to fire</p>
  <p>Mobile: use the on-screen buttons</p>
  <button id="startBtn">Start Game</button>
</div>

<div id="gameOverScreen" class="message hidden">
  <h1>Game Over</h1>
  <p>Final Score: <span id="finalScore">0</span></p>
  <button id="restartBtn">Play Again</button>
</div>

<canvas id="game"></canvas>

<div class="mobileControls">
  <div class="ctrlGroup">
    <div class="ctrlBtn" id="leftBtn">←</div>
    <div class="ctrlBtn" id="rightBtn">→</div>
  </div>
  <div class="ctrlGroup">
    <div class="ctrlBtn" id="fireBtn">●</div>
  </div>
</div>

<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const scoreEl = document.getElementById("score");
  const finalScoreEl = document.getElementById("finalScore");
  const startScreen = document.getElementById("startScreen");
  const gameOverScreen = document.getElementById("gameOverScreen");
  const startBtn = document.getElementById("startBtn");
  const restartBtn = document.getElementById("restartBtn");

  const leftBtn = document.getElementById("leftBtn");
  const rightBtn = document.getElementById("rightBtn");
  const fireBtn = document.getElementById("fireBtn");

  let w = 0;
  let h = 0;
  let animationId = null;

  function resize() {
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener("resize", resize);
  resize();

  const state = {
    running: false,
    score: 0,
    keys: { left: false, right: false, fire: false },
    player: null,
    bullets: [],
    enemies: [],
    particles: [],
    stars: [],
    enemyTimer: 0,
    fireTimer: 0,
    speedScale: 1
  };

  function resetGame() {
    state.score = 0;
    state.bullets = [];
    state.enemies = [];
    state.particles = [];
    state.enemyTimer = 0;
    state.fireTimer = 0;
    state.speedScale = 1;
    scoreEl.textContent = "0";

    state.player = {
      x: w / 2,
      y: h - 90,
      size: 34,
      speed: Math.max(5, w * 0.008),
      alive: true
    };

    state.stars = Array.from({ length: 80 }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      size: Math.random() * 2 + 1,
      speed: Math.random() * 2 + 1
    }));
  }

  function startGame() {
    resetGame();
    startScreen.classList.add("hidden");
    gameOverScreen.classList.add("hidden");
    state.running = true;
    cancelAnimationFrame(animationId);
    loop();
  }

  function endGame() {
    state.running = false;
    finalScoreEl.textContent = state.score;
    gameOverScreen.classList.remove("hidden");
    cancelAnimationFrame(animationId);
  }

  function spawnEnemy() {
    const size = 20 + Math.random() * 26;
    state.enemies.push({
      x: Math.random() * (w - size * 2) + size,
      y: -size * 2,
      size,
      speed: (1.8 + Math.random() * 2.4) * state.speedScale
    });
  }

  function shoot() {
    const p = state.player;
    state.bullets.push({
      x: p.x,
      y: p.y - p.size * 0.85,
      width: 4,
      height: 14,
      speed: 9
    });
  }

  function addExplosion(x, y, color = "#fff") {
    for (let i = 0; i < 14; i++) {
      state.particles.push({
        x,
        y,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 5,
        life: 30 + Math.random() * 20,
        size: 2 + Math.random() * 3,
        color
      });
    }
  }

  function rectsCollide(a, b) {
    return (
      a.x - a.width / 2 < b.x + b.width / 2 &&
      a.x + a.width / 2 > b.x - b.width / 2 &&
      a.y - a.height / 2 < b.y + b.height / 2 &&
      a.y + a.height / 2 > b.y - b.height / 2
    );
  }

  function update() {
    if (!state.running) return;

    state.speedScale += 0.0007;

    for (const star of state.stars) {
      star.y += star.speed * state.speedScale * 0.9;
      if (star.y > h) {
        star.y = -5;
        star.x = Math.random() * w;
      }
    }

    const p = state.player;

    if (state.keys.left) p.x -= p.speed;
    if (state.keys.right) p.x += p.speed;

    p.x = Math.max(p.size, Math.min(w - p.size, p.x));
    p.y = h - 90;

    state.enemyTimer++;
    const enemyRate = Math.max(18, 42 - Math.floor(state.speedScale * 4));
    if (state.enemyTimer >= enemyRate) {
      spawnEnemy();
      state.enemyTimer = 0;
    }

    state.fireTimer++;
    if (state.keys.fire && state.fireTimer >= 10) {
      shoot();
      state.fireTimer = 0;
    }

    for (let i = state.bullets.length - 1; i >= 0; i--) {
      const b = state.bullets[i];
      b.y -= b.speed;
      if (b.y < -20) state.bullets.splice(i, 1);
    }

    const playerHitbox = {
      x: p.x,
      y: p.y,
      width: p.size * 1.6,
      height: p.size * 1.6
    };

    for (let i = state.enemies.length - 1; i >= 0; i--) {
      const e = state.enemies[i];
      e.y += e.speed;

      const enemyHitbox = {
        x: e.x,
        y: e.y,
        width: e.size * 1.2,
        height: e.size * 1.6
      };

      if (e.y > h + e.size * 2) {
        state.enemies.splice(i, 1);
        continue;
      }

      if (rectsCollide(playerHitbox, enemyHitbox)) {
        addExplosion(p.x, p.y, "#ff4d4d");
        endGame();
        return;
      }

      for (let j = state.bullets.length - 1; j >= 0; j--) {
        const b = state.bullets[j];
        const bulletHitbox = {
          x: b.x,
          y: b.y,
          width: b.width,
          height: b.height
        };

        if (rectsCollide(bulletHitbox, enemyHitbox)) {
          addExplosion(e.x, e.y, "#ff4d4d");
          state.bullets.splice(j, 1);
          state.enemies.splice(i, 1);
          state.score += 10;
          scoreEl.textContent = String(state.score);
          break;
        }
      }
    }

    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 1;
      if (p.life <= 0) state.particles.splice(i, 1);
    }
  }

  function drawMercedesLogo(x, y, size) {
    ctx.save();
    ctx.translate(x, y);

    const r = size;

    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = Math.max(2, size * 0.12);

    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();

    for (let i = 0; i < 3; i++) {
      const angle = -Math.PI / 2 + i * (2 * Math.PI / 3);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(angle) * r * 0.9, Math.sin(angle) * r * 0.9);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawTeslaLogo(x, y, size) {
    ctx.save();
    ctx.translate(x, y);
    ctx.strokeStyle = "#ff3b3b";
    ctx.lineWidth = Math.max(2, size * 0.12);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    // top arc
    ctx.beginPath();
    ctx.moveTo(-size * 0.65, -size * 0.55);
    ctx.quadraticCurveTo(0, -size * 0.95, size * 0.65, -size * 0.55);
    ctx.stroke();

    // inner top
    ctx.beginPath();
    ctx.moveTo(-size * 0.28, -size * 0.38);
    ctx.quadraticCurveTo(0, -size * 0.52, size * 0.28, -size * 0.38);
    ctx.stroke();

    // stem
    ctx.beginPath();
    ctx.moveTo(0, -size * 0.35);
    ctx.lineTo(0, size * 0.85);
    ctx.stroke();

    ctx.restore();
  }

  function render() {
    ctx.clearRect(0, 0, w, h);

    for (const star of state.stars) {
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.fillRect(star.x, star.y, star.size, star.size);
    }

    for (const b of state.bullets) {
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(b.x - b.width / 2, b.y - b.height / 2, b.width, b.height);
    }

    for (const e of state.enemies) {
      drawTeslaLogo(e.x, e.y, e.size);
    }

    if (state.player && state.running) {
      drawMercedesLogo(state.player.x, state.player.y, state.player.size);
    }

    for (const p of state.particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life / 50);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function loop() {
    update();
    render();
    if (state.running) animationId = requestAnimationFrame(loop);
  }

  function setKey(key, pressed) {
    if (key === "ArrowLeft") state.keys.left = pressed;
    if (key === "ArrowRight") state.keys.right = pressed;
    if (key === " " || key === "Spacebar" || key === "Space") state.keys.fire = pressed;
  }

  window.addEventListener("keydown", (e) => {
    if (["ArrowLeft", "ArrowRight", " ", "Space", "Spacebar"].includes(e.key)) {
      e.preventDefault();
    }
    setKey(e.key, true);
  });

  window.addEventListener("keyup", (e) => {
    setKey(e.key, false);
  });

  function bindHoldButton(el, onPress, onRelease) {
    const press = (e) => {
      e.preventDefault();
      onPress();
    };
    const release = (e) => {
      e.preventDefault();
      onRelease();
    };

    el.addEventListener("touchstart", press, { passive: false });
    el.addEventListener("touchend", release, { passive: false });
    el.addEventListener("touchcancel", release, { passive: false });

    el.addEventListener("mousedown", press);
    el.addEventListener("mouseup", release);
    el.addEventListener("mouseleave", release);
  }

  bindHoldButton(leftBtn, () => state.keys.left = true, () => state.keys.left = false);
  bindHoldButton(rightBtn, () => state.keys.right = true, () => state.keys.right = false);
  bindHoldButton(fireBtn, () => state.keys.fire = true, () => state.keys.fire = false);

  startBtn.addEventListener("click", startGame);
  restartBtn.addEventListener("click", startGame);

  resetGame();
  render();
</script>

</body>
</html>
