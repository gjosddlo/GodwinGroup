<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GodwinGroup</title>

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
height:100%;
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
overflow:hidden;
}

body{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
}

/* GODWIN GROUP ARRIVAL */

.hero-brand{
position:absolute;
top:22vh;
left:0;
width:100%;
text-align:center;
overflow:visible;
padding:0 16px;
}

.hero-brand span{
display:inline-block;
font-family:"Brush Script MT","Segoe Script","Snell Roundhand",cursive;
font-size:clamp(42px, 9vw, 90px);
letter-spacing:2px;
white-space:nowrap;
transform:translateX(-160vw);
animation:arrival 2.6s cubic-bezier(.18,.9,.25,1) forwards;
}

@keyframes arrival{

0%{
transform:translateX(-150vw) scale(0.75);
opacity:0;
}

60%{
transform:translateX(20px) scale(1.25);
opacity:1;
}

80%{
transform:translateX(-6px) scale(1.18);
}

100%{
transform:translateX(0) scale(1.22);
opacity:1;
}

}

/* COMING SOON */

.main{
text-align:center;
padding:0 20px;
}

.main h1{
margin:0;
font-size:clamp(28px,5vw,40px);
font-weight:600;
letter-spacing:1px;
}

/* FOOTER */

.footer{
position:absolute;
bottom:36px;
left:50%;
transform:translateX(-50%);
text-align:center;
font-size:clamp(12px,3.2vw,18px);
opacity:0.9;
letter-spacing:0.6px;
width:90%;
line-height:1.6;
}

</style>

</head>

<body>

<div class="hero-brand">
<span>Godwin Group</span>
</div>

<div class="main">
<h1>Coming Soon</h1>
</div>

<div class="footer">
Godwin Ventures | Godwin Consultants | G-AI | GodwinEstates
</div>

</body>
</html>
