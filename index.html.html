<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GodwinGroup</title>

<style>

*{box-sizing:border-box;}

html,body{
margin:0;
width:100%;
height:100%;
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
overflow:hidden;
}

body{
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* logo */

.logo{
position:absolute;
top:30px;
left:50%;
transform:translateX(-50%);
z-index:3;
}

.logo img{
width:420px;
max-width:80vw;
height:auto;
}

/* animated brand */

.brand{
position:absolute;
top:170px;
left:50%;
transform:translateX(-140vw) scale(0.9);
font-size:36px;
font-weight:600;
letter-spacing:2px;
white-space:nowrap;
animation:landIn 2.2s cubic-bezier(.2,.9,.2,1) forwards;
}

@keyframes landIn{

0%{
transform:translateX(-140vw) scale(0.9);
opacity:0;
}

70%{
transform:translateX(-52%) scale(1.05);
opacity:1;
}

100%{
transform:translateX(-50%) scale(1.15);
opacity:1;
}

}

/* main text */

.main h1{
margin:0;
font-size:clamp(48px,7vw,90px);
font-weight:650;
letter-spacing:1px;
}

/* tagline */

.tagline{
margin-top:18px;
font-size:clamp(16px,2vw,22px);
letter-spacing:2px;
opacity:0.85;
}

/* footer */

.footer{
position:absolute;
bottom:35px;
left:50%;
transform:translateX(-50%);
width:calc(100% - 40px);
font-size:clamp(12px,1.6vw,18px);
letter-spacing:.6px;
opacity:.85;
}

</style>

</head>

<body>

<div class="logo">
<img src="data:image/png;base64,PASTE-YOUR-EMBEDDED-LOGO-HERE" />
</div>

<div class="brand">
GodwinGroup®
</div>

<div class="main">
<h1>Coming Soon</h1>
<div class="tagline">Consult | Invest | Optimise</div>
</div>

<div class="footer">
Godwin Ventures | Godwin Consultants | G-AI | GodwinEstates
</div>

</body>
</html>
